name: weather_app
description: "Xiaomi-inspired immersive weather app, built to test Opus 4.7."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 网络
  dio: ^5.7.0

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 定位
  geolocator: ^13.0.1
  permission_handler: ^11.3.1

  # 本地缓存
  shared_preferences: ^2.3.2

  # 格式化
  intl: ^0.20.2

  # 状态模型（用于Riverpod AsyncValue的相等性）
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
